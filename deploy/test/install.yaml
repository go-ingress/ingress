# Hermes 集群测试清单（hermes 控制器 + echo 后端 + Ingress）
# 用法：kubectl apply -f deploy/test/install.yaml
---
apiVersion: v1
kind: Namespace
metadata: { name: hermes-system }
---
apiVersion: v1
kind: ServiceAccount
metadata: { namespace: hermes-system, name: hermes }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: hermes }
rules:
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "ingressclasses"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["services", "endpoints", "secrets", "configmaps", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: hermes }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: hermes }
subjects: [{ kind: ServiceAccount, namespace: hermes-system, name: hermes }]
---
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata: { name: hermes }
spec: { controller: hermes.io/ingress-controller }
---
apiVersion: apps/v1
kind: Deployment
metadata: { namespace: hermes-system, name: hermes }
spec:
  replicas: 1
  selector: { matchLabels: { app: hermes } }
  template:
    metadata: { labels: { app: hermes } }
    spec:
      serviceAccountName: hermes
      containers:
        - name: hermes
          image: ghcr.io/go-ingress/hermes:latest
          imagePullPolicy: Always
          args: ["--addr=:8080", "--ingress-class=hermes", "--metrics-addr=:8081"]
          ports:
            - { name: http, containerPort: 8080 }
            - { name: metrics, containerPort: 8081 }
          readinessProbe: { tcpSocket: { port: 8080 }, initialDelaySeconds: 3, periodSeconds: 5 }
          livenessProbe: { tcpSocket: { port: 8080 }, initialDelaySeconds: 10, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata: { namespace: hermes-system, name: hermes }
spec:
  type: NodePort
  selector: { app: hermes }
  ports: [{ name: http, port: 80, targetPort: 8080, nodePort: 30088 }]
---
# echo 后端（default 命名空间）
apiVersion: apps/v1
kind: Deployment
metadata: { namespace: default, name: echo }
spec:
  replicas: 1
  selector: { matchLabels: { app: echo } }
  template:
    metadata: { labels: { app: echo } }
    spec:
      containers:
        - name: echo
          image: nginx:1.14.2
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 80 }]
---
apiVersion: v1
kind: Service
metadata: { namespace: default, name: echo }
spec:
  selector: { app: echo }
  ports: [{ port: 80, targetPort: 80 }]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata: { namespace: default, name: echo }
spec:
  ingressClassName: hermes
  rules:
    - host: echo.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: echo, port: { number: 80 } } }
