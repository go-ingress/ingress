# Hermes HTTPProxy CRD（高级路由）
# 用法：kubectl apply -f deploy/crd/httpproxy.yaml
# 启用：hermes --enable-httpproxy
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: httpproxies.hermes.io
  labels:
    app.kubernetes.io/name: hermes
spec:
  group: hermes.io
  scope: Namespaced
  names:
    kind: HTTPProxy
    plural: httpproxies
    singular: httpproxy
    shortNames: [hpx]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                host:
                  type: string
                routes:
                  type: array
                  items:
                    type: object
                    properties:
                      conditions:
                        type: array
                        items:
                          type: object
                          properties:
                            path: { type: string }
                            prefix: { type: boolean }
                            header: { type: string }
                            value: { type: string }
                      services:
                        type: array
                        items:
                          type: object
                          required: [name, port]
                          properties:
                            name: { type: string }
                            port: { type: integer }
                            weight: { type: integer }
                      rewrite:
                        type: object
                        properties:
                          prefix: { type: string }
