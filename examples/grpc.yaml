# gRPC 路由示例（实验性，需 h2c 明文模式）
# Hermes 明文模式自动启用 h2c，gRPC 客户端可 h2c 直连
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-svc
  labels: { app: grpc-svc }
spec:
  replicas: 2
  selector: { matchLabels: { app: grpc-svc } }
  template:
    metadata: { labels: { app: grpc-svc } }
    spec:
      containers:
        - name: grpc
          image: grpc/java-example:0.1.0   # 任意 gRPC server 镜像
          ports: [ { containerPort: 50051 } ]
---
apiVersion: v1
kind: Service
metadata: { name: grpc-svc }
spec:
  selector: { app: grpc-svc }
  ports: [ { port: 50051, targetPort: 50051 } ]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata: { name: grpc-svc }
spec:
  ingressClassName: hermes
  rules:
    - host: grpc.example.com
      http:
        paths:
          # gRPC service 全名（package.Service）作为 path 前缀
          - path: /helloworld.Greeter
            pathType: Prefix
            backend: { service: { name: grpc-svc, port: { number: 50051 } } }
# 客户端（h2c 明文）：
#   grpcurl -plaintext -authority grpc.example.com \
#     -d '{"name":"hermes"}' \
#     <hermes-ip>:8080 helloworld.Greeter/SayHello
