name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: golangci-lint
        # 用 setup-go 装的 go 1.26 直接安装 golangci-lint v2（v2 用 go1.26 构建，原生支持 go 1.26 目标）。
        # 不用 action@v6：它装 v1.x，v1 的分析器在 go 1.26 下报 "no export data"。
        # 不用 install-mode:goinstall：v1 latest 源码同样有 buildir 加载问题。锁定 v2.12.2（本地验证 0 issues）。
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          golangci-lint run --timeout=5m

      - name: Go vet
        run: go vet ./...

      - name: Go test (race + cover)
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          fail_ci_if_error: false

      - name: Go build
        run: go build ./...

      - name: Build hermes binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bin/hermes ./cmd/hermes

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-linux-amd64
          path: bin/hermes
