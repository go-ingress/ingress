name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          # 用 goinstall 模式：以上一步 setup-go 装的 go 1.26 从源码编译 golangci-lint，
          # 避免预编译二进制（go 1.24 构建）无法分析 go 1.26 目标的报错：
          # "Go language version (go1.24) used to build golangci-lint is lower than the targeted Go version (1.26.0)"
          install-mode: goinstall
          args: --timeout=5m

      - name: Go vet
        run: go vet ./...

      - name: Go test (race + cover)
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          fail_ci_if_error: false

      - name: Go build
        run: go build ./...

      - name: Build hermes binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bin/hermes ./cmd/hermes

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: hermes-linux-amd64
          path: bin/hermes
