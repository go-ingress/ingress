name: 功能建议
description: 提出新功能或改进建议
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 当前哪里不满足需求？
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 建议的方案
      description: 你期望的行为是什么？有参考实现吗？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
